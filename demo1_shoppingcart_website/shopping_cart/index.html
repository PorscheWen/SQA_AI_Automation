<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易購物車 - Demo Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1 id="page-title">Demo Shop 購物車</h1>
    <p class="subtitle">TestComplete 自動化測試示範頁</p>
  </header>

  <main class="container">
    <section id="product-section" class="panel">
      <h2>商品列表</h2>
      <div class="product-grid">
        <article class="product-card" id="product-apple" data-product-id="apple">
          <h3 class="product-name">蘋果</h3>
          <p class="product-price" data-price="30">NT$ 30</p>
          <button type="button" class="btn btn-add" id="btn-add-apple" data-testid="add-apple">
            加入購物車
          </button>
        </article>

        <article class="product-card" id="product-banana" data-product-id="banana">
          <h3 class="product-name">香蕉</h3>
          <p class="product-price" data-price="20">NT$ 20</p>
          <button type="button" class="btn btn-add" id="btn-add-banana" data-testid="add-banana">
            加入購物車
          </button>
        </article>

        <article class="product-card" id="product-milk" data-product-id="milk">
          <h3 class="product-name">鮮奶</h3>
          <p class="product-price" data-price="55">NT$ 55</p>
          <button type="button" class="btn btn-add" id="btn-add-milk" data-testid="add-milk">
            加入購物車
          </button>
        </article>
      </div>
    </section>

    <section id="cart-section" class="panel">
      <div class="cart-header">
        <h2>購物車</h2>
        <span id="cart-count" class="badge" data-testid="cart-count">0 件</span>
      </div>

      <p id="cart-empty-message" class="empty-message" data-testid="cart-empty">
        購物車是空的，請從左側加入商品。
      </p>

      <ul id="cart-items" class="cart-list" data-testid="cart-items" hidden></ul>

      <div id="cart-summary" class="cart-summary" hidden>
        <div class="summary-row">
          <span>小計</span>
          <span id="cart-subtotal" data-testid="cart-subtotal">NT$ 0</span>
        </div>
        <div class="summary-row total">
          <span>總計</span>
          <span id="cart-total" data-testid="cart-total">NT$ 0</span>
        </div>
        <div class="cart-actions">
          <button type="button" class="btn btn-secondary" id="btn-clear-cart" data-testid="clear-cart">
            清空購物車
          </button>
          <button type="button" class="btn btn-primary" id="btn-checkout" data-testid="checkout">
            結帳
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="checkout-modal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-labelledby="modal-title">
      <h2 id="modal-title">結帳成功</h2>
      <p id="checkout-message" data-testid="checkout-message">
        感謝您的購買！訂單已成立。
      </p>
      <p id="checkout-total" data-testid="checkout-total">總金額：NT$ 0</p>
      <button type="button" class="btn btn-primary" id="btn-close-modal" data-testid="close-modal">
        關閉
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
