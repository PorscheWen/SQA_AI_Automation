# Pytest Configuration
[pytest]
# 測試路徑
testpaths = tests

# 輸出設定
console_output_style = progress
addopts =
    -v
    --strict-markers
    --tb=short

# 標記定義
markers =
    functional: 黑箱功能測試 (FT01-FT06)
    negative: 負面測試 (NT01-NT03)
    compat: 瀏覽器相容測試 (CT01-CT02)
    smoke: 煙霧測試

# Python 路徑
pythonpath = .

# 日誌設定
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 警告過濾
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
